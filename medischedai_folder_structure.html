let activeEl = null;

function makeNode(node, depth) {
  const div = document.createElement('div');
  div.className = 'node';
  const isDir = node.name.endsWith('/');
  const row = document.createElement('div');
  row.className = 'node-row';
  row.style.paddingLeft = (depth * 16 + 6) + 'px';

  const toggle = document.createElement('span');
  toggle.className = 'toggle';
  if (isDir && node.children?.length) {
    toggle.textContent = '▶';
    if (node.open) toggle.classList.add('open');
  } else {
    toggle.style.visibility = 'hidden';
  }

  const icon = document.createElement('span');
  icon.className = 'icon';
  icon.textContent = node.icon || (isDir ? '📁' : '📄');

  const name = document.createElement('span');
  name.className = isDir ? 'name' : 'name file';
  name.textContent = node.name;

  row.appendChild(toggle);
  row.appendChild(icon);
  row.appendChild(name);

  if (node.badge) {
    const b = document.createElement('span');
    b.className = 'badge badge-' + node.badge;
    b.textContent = node.badge;
    row.appendChild(b);
  }

  div.appendChild(row);

  let childrenDiv = null;
  if (isDir && node.children?.length) {
    childrenDiv = document.createElement('div');
    childrenDiv.className = 'children' + (node.open ? '' : ' collapsed');
    node.children.forEach(c => childrenDiv.appendChild(makeNode(c, depth + 1)));
    div.appendChild(childrenDiv);
  }

  const key = node.name;
  row.addEventListener('click', (e) => {
    e.stopPropagation();
    if (activeEl) activeEl.classList.remove('active');
    row.classList.add('active');
    activeEl = row;

    if (childrenDiv) {
      const collapsed = childrenDiv.classList.toggle('collapsed');
      toggle.classList.toggle('open', !collapsed);
    }

    const info = INFO[key] || INFO[key.replace('backend/', '').replace('frontend/src/', '')];
    const panel = document.getElementById('detail');
    if (info) {
      panel.innerHTML = `<h3>${key}</h3><p>${info.desc}</p>
        <div class="tags">${(info.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
    } else {
      panel.innerHTML = `<h3>${key}</h3><p>Core project file. Click parent folders for context.</p>`;
    }
  });

  div._childrenDiv = childrenDiv;
  div._toggle = toggle;
  return div;
}

function renderTree() {
  const container = document.getElementById('tree');
  container.innerHTML = '';
  container.appendChild(makeNode(TREE, 0));
}

function expandAll() {
  document.querySelectorAll('.children').forEach(c => c.classList.remove('collapsed'));
  document.querySelectorAll('.toggle').forEach(t => t.classList.add('open'));
}
function collapseAll() {
  document.querySelectorAll('.children').forEach(c => c.classList.add('collapsed'));
  document.querySelectorAll('.toggle').forEach(t => t.classList.remove('open'));
}

renderTree();
</script>
